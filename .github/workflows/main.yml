name: Extract ZIP to Root

on:
  push:
    paths:
      - 's.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Auto extract')"

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract s.zip to root
        run: unzip -o s.zip -d .

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Auto extract s.zip" || echo "No changes"
          git push
