<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlexPOS — Customers</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/main.css" /><link rel="stylesheet" href="css/sidebar.css" />
</head>
<body>
  <div id="sidebar-mount"></div>
  <div class="main-wrapper" id="main-wrapper">
    <div id="topbar-mount"></div>
    <main class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Customer <span>Management</span></h1>
          <div class="page-subtitle">Manage customers and loyalty points</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-glass" id="export-customers-btn"><i class="bi bi-download me-2"></i>Export</button>
          <button class="btn btn-primary" id="add-customer-btn"><i class="bi bi-person-plus me-2"></i>Add Customer</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="glass-card stat-card"><div class="stat-icon info"><i class="bi bi-people"></i></div><div class="stat-value" id="cust-total">—</div><div class="stat-label">Total Customers</div></div>
        </div>
        <div class="col-6 col-md-3">
          <div class="glass-card stat-card"><div class="stat-icon success"><i class="bi bi-currency-dollar"></i></div><div class="stat-value" id="cust-avg-spend">—</div><div class="stat-label">Avg. Spend</div></div>
        </div>
        <div class="col-6 col-md-3">
          <div class="glass-card stat-card"><div class="stat-icon"><i class="bi bi-star"></i></div><div class="stat-value" id="cust-total-pts">—</div><div class="stat-label">Loyalty Points Issued</div></div>
        </div>
        <div class="col-6 col-md-3">
          <div class="glass-card stat-card"><div class="stat-icon warning"><i class="bi bi-trophy"></i></div><div class="stat-value" id="cust-top-spender">—</div><div class="stat-label">Top Spender</div></div>
        </div>
      </div>

      <!-- Search + Table -->
      <div class="glass-card">
        <div class="p-3 border-bottom" style="border-color:var(--border-color)!important">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" id="cust-search" placeholder="Search by name, email, or phone…" />
              </div>
            </div>
          </div>
        </div>
        <div class="fp-table-wrapper">
          <table class="fp-table">
            <thead>
              <tr>
                <th>Customer</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Loyalty Points</th>
                <th>Total Spent</th>
                <th>Joined</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="cust-tbody">
              <tr><td colspan="7" class="text-center py-5"><div class="fp-spinner mx-auto"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="fp-pagination" id="cust-pagination"></div>
      </div>
    </main>
  </div>

  <!-- Customer Drawer -->
  <div class="fp-drawer-overlay" id="drawer-overlay"></div>
  <div class="fp-drawer" id="customer-drawer">
    <div class="fp-drawer-header">
      <div class="fp-drawer-title" id="drawer-title">Add Customer</div>
      <button class="btn btn-glass btn-icon" id="close-drawer-btn"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="fp-drawer-body">
      <input type="hidden" id="edit-cust-id" />
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Full Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="c-name" placeholder="John Doe" />
        </div>
        <div class="col-6">
          <label class="form-label">Phone</label>
          <input type="text" class="form-control" id="c-phone" placeholder="+1 555-0100" />
        </div>
        <div class="col-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="c-email" placeholder="john@example.com" />
        </div>
        <div class="col-12">
          <label class="form-label">Address</label>
          <textarea class="form-control" id="c-address" rows="2" placeholder="Street, City, Country"></textarea>
        </div>
        <div class="col-6" id="loyalty-wrap" style="display:none">
          <label class="form-label">Loyalty Points</label>
          <input type="number" class="form-control" id="c-loyalty" min="0" placeholder="0" />
        </div>
        <div class="col-6" id="loyalty-reason-wrap" style="display:none">
          <label class="form-label">Adjustment Reason</label>
          <input type="text" class="form-control" id="c-loyalty-reason" placeholder="Manual adjustment" />
        </div>
      </div>

      <!-- Purchase History (edit mode) -->
      <div id="purchase-history-section" class="mt-4" style="display:none">
        <div class="section-title">Purchase History</div>
        <div id="purchase-history-list">
          <div class="text-center py-3"><div class="fp-spinner mx-auto"></div></div>
        </div>
      </div>
    </div>
    <div class="fp-drawer-footer">
      <button class="btn btn-glass" id="cancel-drawer-btn">Cancel</button>
      <button class="btn btn-primary" id="save-cust-btn"><i class="bi bi-check-lg me-2"></i>Save</button>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script type="module">
    import { guard }              from './js/router.js';
    import { buildSidebar, buildTopbar, filterNavByRole } from './js/layout.js';
    import { initSidebar, startClock } from './js/sidebar.js';
    import { initTheme }          from './js/theme.js';
    import { populateSidebarUser } from './js/auth.js';
    import { Toast, confirm, formatCurrency, formatDate, Paginator, debounce } from './js/utils.js';
    import { ExportService }      from './js/exportService.js';
    import { db }                 from './js/firebase-config.js';
    import {
      collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc,
      getDocs, query, where, orderBy, limit, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    initTheme();
    document.getElementById('sidebar-mount').innerHTML = buildSidebar('customers');
    document.getElementById('topbar-mount').innerHTML  = buildTopbar('Customers', 'Loyalty management');
    initSidebar(); startClock();
    const userDoc = await guard(); if (!userDoc) throw new Error('Unauthorized');
    populateSidebarUser(userDoc); filterNavByRole(userDoc.role);

    let allCustomers = [];
    let editingId    = null;
    const paginator  = new Paginator({ perPage: 25, onRender: renderTable });

    const drawerOverlay = document.getElementById('drawer-overlay');
    const drawer        = document.getElementById('customer-drawer');

    // ── Live customers ──
    onSnapshot(collection(db, 'customers'), snap => {
      allCustomers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateStats();
      applyFilters();
    });

    function updateStats() {
      const total    = allCustomers.length;
      const spent    = allCustomers.reduce((s, c) => s + (c.totalSpent || 0), 0);
      const pts      = allCustomers.reduce((s, c) => s + (c.loyaltyPoints || 0), 0);
      const top      = allCustomers.sort((a, b) => (b.totalSpent || 0) - (a.totalSpent || 0))[0];
      document.getElementById('cust-total').textContent     = total;
      document.getElementById('cust-avg-spend').textContent = total ? formatCurrency(spent / total) : '—';
      document.getElementById('cust-total-pts').textContent = pts.toLocaleString();
      document.getElementById('cust-top-spender').textContent = top?.name?.split(' ')[0] || '—';
    }

    function applyFilters() {
      const q = document.getElementById('cust-search').value.toLowerCase();
      let filtered = allCustomers.filter(c =>
        !q || c.name?.toLowerCase().includes(q) ||
              c.email?.toLowerCase().includes(q) ||
              c.phone?.includes(q)
      );
      filtered.sort((a, b) => a.name?.localeCompare(b.name));
      paginator.setData(filtered);
      paginator.render();
      paginator.renderControls('cust-pagination');
    }

    function renderTable(data) {
      const tbody = document.getElementById('cust-tbody');
      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="fp-empty"><i class="bi bi-people fp-empty-icon"></i><div class="fp-empty-title">No customers found</div></div></td></tr>`;
        return;
      }
      tbody.innerHTML = data.map(c => `<tr>
        <td>
          <div class="d-flex align-items-center gap-2">
            <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:#fff;font-size:.8rem;flex-shrink:0">
              ${(c.name||'U')[0].toUpperCase()}
            </div>
            <div class="td-main">${c.name}</div>
          </div>
        </td>
        <td>${c.phone || '—'}</td>
        <td>${c.email || '—'}</td>
        <td><span class="fp-badge fp-badge-primary"><i class="bi bi-star-fill me-1"></i>${(c.loyaltyPoints||0).toLocaleString()}</span></td>
        <td class="td-main">${formatCurrency(c.totalSpent || 0)}</td>
        <td>${formatDate(c.createdAt)}</td>
        <td>
          <div class="d-flex gap-1">
            <button class="btn btn-glass btn-icon" data-action="edit" data-id="${c.id}" title="Edit"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-danger-glass btn-icon" data-action="delete" data-id="${c.id}" title="Delete"><i class="bi bi-trash3"></i></button>
          </div>
        </td>
      </tr>`).join('');

      tbody.querySelectorAll('[data-action]').forEach(btn => {
        const cust = allCustomers.find(c => c.id === btn.dataset.id);
        if (btn.dataset.action === 'edit')   btn.addEventListener('click', () => openDrawer(cust));
        if (btn.dataset.action === 'delete') btn.addEventListener('click', () => deleteCustomer(btn.dataset.id, cust?.name));
      });
    }

    document.getElementById('cust-search').addEventListener('input', debounce(applyFilters, 200));

    // ── Drawer ──
    function openDrawer(cust = null) {
      editingId = cust?.id || null;
      document.getElementById('drawer-title').textContent = cust ? 'Edit Customer' : 'Add Customer';
      ['c-name','c-phone','c-email','c-address','c-loyalty','c-loyalty-reason'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('loyalty-wrap').style.display        = cust ? 'block' : 'none';
      document.getElementById('loyalty-reason-wrap').style.display = cust ? 'block' : 'none';
      document.getElementById('purchase-history-section').style.display = cust ? 'block' : 'none';
      if (cust) {
        document.getElementById('c-name').value    = cust.name || '';
        document.getElementById('c-phone').value   = cust.phone || '';
        document.getElementById('c-email').value   = cust.email || '';
        document.getElementById('c-address').value = cust.address || '';
        document.getElementById('c-loyalty').value = cust.loyaltyPoints || 0;
        loadPurchaseHistory(cust.id);
      }
      drawerOverlay.classList.add('open');
      drawer.classList.add('open');
    }
    function closeDrawer() {
      drawerOverlay.classList.remove('open');
      drawer.classList.remove('open');
    }

    async function loadPurchaseHistory(customerId) {
      const el = document.getElementById('purchase-history-list');
      try {
        const snap = await getDocs(query(
          collection(db, 'transactions'),
          where('customerId', '==', customerId),
          orderBy('createdAt', 'desc'),
          limit(5)
        ));
        if (!snap.size) {
          el.innerHTML = `<div class="fp-empty" style="padding:20px"><div class="fp-empty-title">No purchases yet</div></div>`;
          return;
        }
        el.innerHTML = snap.docs.map(d => {
          const t = d.data();
          const dt = t.createdAt ? new Date(t.createdAt.seconds*1000).toLocaleDateString([], {month:'short',day:'numeric'}) : '—';
          return `<div class="d-flex justify-content-between align-items-center py-2 border-bottom" style="border-color:var(--border-color)!important;font-size:.83rem">
            <div><div style="font-weight:600">${dt}</div><div style="color:var(--text-muted)">${t.items?.length || 0} items · ${t.paymentMethod}</div></div>
            <span class="fp-badge fp-badge-primary">${formatCurrency(t.total)}</span>
          </div>`;
        }).join('');
      } catch (_) {
        el.innerHTML = `<div style="font-size:.8rem;color:var(--text-muted);padding:8px">Could not load history (may need Firestore index)</div>`;
      }
    }

    document.getElementById('add-customer-btn').addEventListener('click', () => openDrawer());
    document.getElementById('close-drawer-btn').addEventListener('click', closeDrawer);
    document.getElementById('cancel-drawer-btn').addEventListener('click', closeDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);

    document.getElementById('save-cust-btn').addEventListener('click', async () => {
      const name = document.getElementById('c-name').value.trim();
      if (!name) { Toast.error('Name is required'); return; }
      const data = {
        name,
        phone:   document.getElementById('c-phone').value.trim(),
        email:   document.getElementById('c-email').value.trim(),
        address: document.getElementById('c-address').value.trim(),
        updatedAt: serverTimestamp()
      };
      const btn = document.getElementById('save-cust-btn');
      btn.disabled = true;
      try {
        if (editingId) {
          const loyaltyVal = parseInt(document.getElementById('c-loyalty').value) || 0;
          data.loyaltyPoints = loyaltyVal;
          await updateDoc(doc(db, 'customers', editingId), data);
          Toast.success('Customer updated');
        } else {
          await addDoc(collection(db, 'customers'), { ...data, loyaltyPoints: 0, totalSpent: 0, createdAt: serverTimestamp() });
          Toast.success('Customer added');
        }
        closeDrawer();
      } catch (err) {
        Toast.error('Save failed: ' + err.message);
      } finally { btn.disabled = false; }
    });

    async function deleteCustomer(id, name) {
      const ok = await confirm({ title: 'Delete Customer?', message: `"${name}" will be removed.`, type: 'danger', confirmText: 'Delete' });
      if (!ok) return;
      try { await deleteDoc(doc(db, 'customers', id)); Toast.success('Customer deleted'); }
      catch (err) { Toast.error('Delete failed: ' + err.message); }
    }

    document.getElementById('export-customers-btn').addEventListener('click', () => {
      ExportService.toCSV(allCustomers.map(c => ({
        Name: c.name, Phone: c.phone||'', Email: c.email||'',
        'Loyalty Points': c.loyaltyPoints||0, 'Total Spent': c.totalSpent||0
      })), 'customers.csv');
    });
  </script>
</body>
</html>
