<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlexPOS — Expenses</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/main.css" /><link rel="stylesheet" href="css/sidebar.css" />
</head>
<body>
  <div id="sidebar-mount"></div>
  <div class="main-wrapper" id="main-wrapper">
    <div id="topbar-mount"></div>
    <main class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Expense <span>Management</span></h1>
          <div class="page-subtitle">Track and categorize business expenses</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-glass" id="export-exp-btn"><i class="bi bi-download me-2"></i>Export</button>
          <button class="btn btn-primary" id="add-exp-btn"><i class="bi bi-plus-lg me-2"></i>Add Expense</button>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <!-- Stat Cards -->
        <div class="col-6 col-md-3"><div class="glass-card stat-card"><div class="stat-icon danger"><i class="bi bi-cash-stack"></i></div><div class="stat-value" id="exp-month-total">—</div><div class="stat-label">This Month</div></div></div>
        <div class="col-6 col-md-3"><div class="glass-card stat-card"><div class="stat-icon warning"><i class="bi bi-calendar3"></i></div><div class="stat-value" id="exp-year-total">—</div><div class="stat-label">This Year</div></div></div>
        <div class="col-6 col-md-3"><div class="glass-card stat-card"><div class="stat-icon"><i class="bi bi-tags"></i></div><div class="stat-value" id="exp-top-cat">—</div><div class="stat-label">Top Category</div></div></div>
        <div class="col-6 col-md-3"><div class="glass-card stat-card"><div class="stat-icon info"><i class="bi bi-receipt"></i></div><div class="stat-value" id="exp-count">—</div><div class="stat-label">Total Entries</div></div></div>

        <!-- Chart -->
        <div class="col-12 col-md-5">
          <div class="glass-card p-4 h-100">
            <div class="section-title mb-3">Expenses by Category</div>
            <div class="chart-wrapper" style="height:200px"><canvas id="chart-exp-cat"></canvas></div>
          </div>
        </div>
        <div class="col-12 col-md-7">
          <div class="glass-card p-4 h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="section-title mb-0">Monthly Trend</div>
              <select class="form-select form-select-sm" id="filter-month" style="width:auto">
                <option value="">All Months</option>
              </select>
            </div>
            <div class="chart-wrapper" style="height:180px"><canvas id="chart-exp-trend"></canvas></div>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="glass-card">
        <div class="p-3 border-bottom" style="border-color:var(--border-color)!important">
          <div class="row g-3 align-items-center">
            <div class="col-12 col-md-5">
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" id="exp-search" placeholder="Search expenses…" />
              </div>
            </div>
            <div class="col-6 col-md-3">
              <select class="form-select" id="filter-cat">
                <option value="">All Categories</option>
                <option value="rent">Rent</option>
                <option value="utilities">Utilities</option>
                <option value="salary">Salary</option>
                <option value="supplies">Supplies</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
        </div>
        <div class="fp-table-wrapper">
          <table class="fp-table">
            <thead><tr><th>Title</th><th>Category</th><th>Amount</th><th>Note</th><th>Date</th><th>Added By</th><th>Actions</th></tr></thead>
            <tbody id="exp-tbody"><tr><td colspan="7" class="text-center py-5"><div class="fp-spinner mx-auto"></div></td></tr></tbody>
          </table>
        </div>
        <div class="fp-pagination" id="exp-pagination"></div>
      </div>
    </main>
  </div>

  <!-- Expense Modal -->
  <div class="modal fade" id="expenseModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exp-modal-title"><i class="bi bi-cash-stack me-2"></i>Add Expense</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-exp-id" />
          <div class="row g-3">
            <div class="col-12"><label class="form-label">Title <span class="text-danger">*</span></label><input type="text" class="form-control" id="e-title" placeholder="e.g. Monthly Rent" /></div>
            <div class="col-6"><label class="form-label">Amount <span class="text-danger">*</span></label><div class="input-group"><span class="input-group-text">$</span><input type="number" class="form-control" id="e-amount" min="0" step="0.01" placeholder="0.00" /></div></div>
            <div class="col-6"><label class="form-label">Category <span class="text-danger">*</span></label>
              <select class="form-select" id="e-category">
                <option value="rent">Rent</option><option value="utilities">Utilities</option>
                <option value="salary">Salary</option><option value="supplies">Supplies</option><option value="other">Other</option>
              </select>
            </div>
            <div class="col-6"><label class="form-label">Date</label><input type="date" class="form-control" id="e-date" /></div>
            <div class="col-12"><label class="form-label">Note</label><textarea class="form-control" id="e-note" rows="2" placeholder="Optional notes…"></textarea></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-glass" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" id="save-exp-btn"><i class="bi bi-check-lg me-2"></i>Save</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script type="module">
    import { guard }              from './js/router.js';
    import { buildSidebar, buildTopbar, filterNavByRole } from './js/layout.js';
    import { initSidebar, startClock } from './js/sidebar.js';
    import { initTheme }          from './js/theme.js';
    import { populateSidebarUser } from './js/auth.js';
    import { Toast, confirm, formatCurrency, formatDate, Paginator, debounce, toDateInputValue } from './js/utils.js';
    import { ExportService }      from './js/exportService.js';
    import { db }                 from './js/firebase-config.js';
    import {
      collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc, serverTimestamp, Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    initTheme();
    document.getElementById('sidebar-mount').innerHTML = buildSidebar('expenses');
    document.getElementById('topbar-mount').innerHTML  = buildTopbar('Expenses', 'Business expense tracking');
    initSidebar(); startClock();
    const userDoc = await guard(); if (!userDoc) throw new Error('Unauthorized');
    populateSidebarUser(userDoc); filterNavByRole(userDoc.role);

    let allExpenses = [];
    let editingId   = null;
    let catChart = null, trendChart = null;
    const paginator = new Paginator({ perPage: 25, onRender: renderTable });
    const expModal  = new bootstrap.Modal(document.getElementById('expenseModal'));

    const CAT_COLORS = { rent:'#6366f1', utilities:'#06b6d4', salary:'#10b981', supplies:'#f59e0b', other:'#8b5cf6' };

    // Set default date
    document.getElementById('e-date').value = new Date().toISOString().split('T')[0];

    // ── Load months filter ──
    function buildMonthFilter() {
      const months = [...new Set(allExpenses.map(e => {
        const d = e.date?.seconds ? new Date(e.date.seconds*1000) : new Date(e.date);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      }))].sort().reverse();
      const sel = document.getElementById('filter-month');
      const cur = sel.value;
      sel.innerHTML = `<option value="">All Months</option>` +
        months.map(m => {
          const [y, mo] = m.split('-');
          const label = new Date(y, mo-1).toLocaleDateString([], {month:'long', year:'numeric'});
          return `<option value="${m}" ${m===cur?'selected':''}>${label}</option>`;
        }).join('');
    }

    onSnapshot(collection(db, 'expenses'), snap => {
      allExpenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      buildMonthFilter();
      updateStats();
      updateCharts();
      applyFilters();
    });

    function updateStats() {
      const now = new Date();
      const monthExp = allExpenses.filter(e => {
        const d = e.date?.seconds ? new Date(e.date.seconds*1000) : new Date(e.date);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      });
      const yearExp = allExpenses.filter(e => {
        const d = e.date?.seconds ? new Date(e.date.seconds*1000) : new Date(e.date);
        return d.getFullYear() === now.getFullYear();
      });
      const catTotals = {};
      allExpenses.forEach(e => catTotals[e.category] = (catTotals[e.category]||0) + (e.amount||0));
      const topCat = Object.entries(catTotals).sort((a,b) => b[1]-a[1])[0]?.[0];
      document.getElementById('exp-month-total').textContent = formatCurrency(monthExp.reduce((s,e) => s+e.amount, 0));
      document.getElementById('exp-year-total').textContent  = formatCurrency(yearExp.reduce((s,e) => s+e.amount, 0));
      document.getElementById('exp-top-cat').textContent     = topCat ? topCat.charAt(0).toUpperCase()+topCat.slice(1) : '—';
      document.getElementById('exp-count').textContent       = allExpenses.length;
    }

    function updateCharts() {
      // Category doughnut
      const catTotals = {};
      allExpenses.forEach(e => catTotals[e.category] = (catTotals[e.category]||0) + (e.amount||0));
      const cats   = Object.keys(catTotals);
      const totals = cats.map(c => catTotals[c]);
      const colors = cats.map(c => CAT_COLORS[c] || '#6366f1');

      if (catChart) catChart.destroy();
      catChart = new Chart(document.getElementById('chart-exp-cat'), {
        type: 'doughnut',
        data: { labels: cats.map(c => c.charAt(0).toUpperCase()+c.slice(1)), datasets: [{ data: totals, backgroundColor: colors, borderWidth: 0, hoverOffset: 8 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'right', labels: { color: 'rgba(241,240,249,0.6)', font: { size: 11 } } } } }
      });

      // Monthly trend (last 6 months)
      const months = [];
      const monthlyTotals = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
        months.push(d.toLocaleDateString([], {month:'short', year:'2-digit'}));
        const total = allExpenses.filter(e => {
          const ed = e.date?.seconds ? new Date(e.date.seconds*1000) : new Date(e.date);
          return ed.getMonth() === d.getMonth() && ed.getFullYear() === d.getFullYear();
        }).reduce((s,e) => s+e.amount, 0);
        monthlyTotals.push(total);
      }
      if (trendChart) trendChart.destroy();
      trendChart = new Chart(document.getElementById('chart-exp-trend'), {
        type: 'bar',
        data: { labels: months, datasets: [{ label: 'Expenses', data: monthlyTotals, backgroundColor: 'rgba(239,68,68,0.5)', borderColor: 'rgba(239,68,68,0.8)', borderWidth: 1, borderRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: {
          x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(241,240,249,0.45)', font: { size: 10 } } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(241,240,249,0.45)', font: { size: 10 }, callback: v => '$'+v } }
        }}
      });
    }

    function applyFilters() {
      const q   = document.getElementById('exp-search').value.toLowerCase();
      const cat = document.getElementById('filter-cat').value;
      const mon = document.getElementById('filter-month').value;
      let filtered = allExpenses.filter(e => {
        const mQ = !q || e.title?.toLowerCase().includes(q) || e.note?.toLowerCase().includes(q);
        const mC = !cat || e.category === cat;
        let mM = true;
        if (mon) {
          const d = e.date?.seconds ? new Date(e.date.seconds*1000) : new Date(e.date);
          const em = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
          mM = em === mon;
        }
        return mQ && mC && mM;
      });
      filtered.sort((a, b) => {
        const ad = a.date?.seconds || 0;
        const bd = b.date?.seconds || 0;
        return bd - ad;
      });
      paginator.setData(filtered);
      paginator.render();
      paginator.renderControls('exp-pagination');
    }

    function renderTable(data) {
      const tbody = document.getElementById('exp-tbody');
      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="fp-empty"><i class="bi bi-cash-stack fp-empty-icon"></i><div class="fp-empty-title">No expenses found</div></div></td></tr>`;
        return;
      }
      tbody.innerHTML = data.map(e => {
        const color = CAT_COLORS[e.category] || '#6366f1';
        const dt    = e.date?.seconds ? new Date(e.date.seconds*1000).toLocaleDateString([], {month:'short',day:'numeric',year:'numeric'}) : '—';
        return `<tr>
          <td class="td-main">${e.title}</td>
          <td><span class="fp-badge" style="background:${color}22;color:${color}">${e.category?.charAt(0).toUpperCase()+e.category?.slice(1)}</span></td>
          <td class="td-main" style="color:var(--danger)">${formatCurrency(e.amount)}</td>
          <td>${e.note || '—'}</td>
          <td>${dt}</td>
          <td>${e.addedBy || '—'}</td>
          <td>
            <div class="d-flex gap-1">
              <button class="btn btn-glass btn-icon" data-action="edit" data-id="${e.id}"><i class="bi bi-pencil"></i></button>
              <button class="btn btn-danger-glass btn-icon" data-action="delete" data-id="${e.id}"><i class="bi bi-trash3"></i></button>
            </div>
          </td>
        </tr>`;
      }).join('');
      tbody.querySelectorAll('[data-action]').forEach(btn => {
        const exp = allExpenses.find(e => e.id === btn.dataset.id);
        if (btn.dataset.action === 'edit')   btn.addEventListener('click', () => openModal(exp));
        if (btn.dataset.action === 'delete') btn.addEventListener('click', () => deleteExpense(btn.dataset.id, exp?.title));
      });
    }

    ['exp-search','filter-cat','filter-month'].forEach(id => {
      document.getElementById(id).addEventListener('input', debounce(applyFilters, 200));
      document.getElementById(id).addEventListener('change', applyFilters);
    });

    function openModal(exp = null) {
      editingId = exp?.id || null;
      document.getElementById('exp-modal-title').innerHTML = `<i class="bi bi-cash-stack me-2"></i>${exp ? 'Edit' : 'Add'} Expense`;
      document.getElementById('e-title').value    = exp?.title    || '';
      document.getElementById('e-amount').value   = exp?.amount   || '';
      document.getElementById('e-category').value = exp?.category || 'other';
      document.getElementById('e-note').value     = exp?.note     || '';
      if (exp?.date) {
        const d = exp.date.seconds ? new Date(exp.date.seconds*1000) : new Date(exp.date);
        document.getElementById('e-date').value = d.toISOString().split('T')[0];
      } else {
        document.getElementById('e-date').value = new Date().toISOString().split('T')[0];
      }
      expModal.show();
    }

    document.getElementById('add-exp-btn').addEventListener('click', () => openModal());

    document.getElementById('save-exp-btn').addEventListener('click', async () => {
      const title  = document.getElementById('e-title').value.trim();
      const amount = parseFloat(document.getElementById('e-amount').value);
      if (!title)         { Toast.error('Title is required'); return; }
      if (isNaN(amount))  { Toast.error('Amount is required'); return; }

      const dateVal = document.getElementById('e-date').value;
      const data = {
        title,
        amount,
        category: document.getElementById('e-category').value,
        note:     document.getElementById('e-note').value.trim(),
        date:     dateVal ? Timestamp.fromDate(new Date(dateVal)) : serverTimestamp(),
        addedBy:  userDoc.name
      };
      const btn = document.getElementById('save-exp-btn');
      btn.disabled = true;
      try {
        if (editingId) { await updateDoc(doc(db, 'expenses', editingId), data); Toast.success('Expense updated'); }
        else           { await addDoc(collection(db, 'expenses'), data); Toast.success('Expense added'); }
        expModal.hide();
      } catch (err) { Toast.error('Save failed: ' + err.message); }
      finally { btn.disabled = false; }
    });

    async function deleteExpense(id, title) {
      const ok = await confirm({ title: 'Delete Expense?', message: `"${title}" will be removed.`, type: 'danger', confirmText: 'Delete' });
      if (!ok) return;
      try { await deleteDoc(doc(db, 'expenses', id)); Toast.success('Expense deleted'); }
      catch (err) { Toast.error('Delete failed: ' + err.message); }
    }

    document.getElementById('export-exp-btn').addEventListener('click', () => {
      ExportService.toCSV(allExpenses.map(e => ({
        Title: e.title, Category: e.category, Amount: e.amount,
        Note: e.note||'', Date: e.date?.seconds ? new Date(e.date.seconds*1000).toLocaleDateString() : '', By: e.addedBy||''
      })), 'expenses.csv');
    });
  </script>
</body>
</html>
