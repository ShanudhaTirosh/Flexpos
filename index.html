<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlexPOS — Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .login-bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }
    .auth-tabs .nav-link {
      color: var(--text-muted); border: none;
      border-bottom: 2px solid transparent;
      padding: 8px 20px; border-radius: 0;
      background: transparent; font-weight: 600; font-size: .875rem;
      transition: all var(--transition);
    }
    .auth-tabs .nav-link.active {
      color: var(--accent); border-bottom-color: var(--accent);
      background: transparent;
    }
    .login-illustration {
      position: fixed; right: 0; top: 0; bottom: 0; width: 45%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; pointer-events: none;
    }
    .login-illustration .orb {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.2), transparent 70%);
    }
    .orb-1 { width: 500px; height: 500px; top: -100px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; bottom: 100px; right: 200px; background: radial-gradient(circle, rgba(139,92,246,0.15), transparent 70%); }
    @media (max-width: 768px) { .login-illustration { display: none; } }
  </style>
</head>
<body>
  <div class="login-bg-grid"></div>
  <div class="login-illustration">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div style="text-align:center;z-index:1;padding:40px;">
      <div style="font-family:var(--font-display);font-size:4rem;font-weight:800;color:rgba(255,255,255,0.06);line-height:1">FLEX<br>POS</div>
    </div>
  </div>

  <div class="login-page">
    <div class="glass-card login-card">
      <!-- Logo -->
      <div class="login-logo mb-1">
        <div class="logo-icon"><i class="bi bi-lightning-charge-fill"></i></div>
        Flex<span style="color:var(--accent)">POS</span>
      </div>
      <p class="login-subtitle">Enterprise Point of Sale Platform</p>

      <!-- Tabs -->
      <ul class="nav auth-tabs mb-4 border-bottom" style="border-color:var(--border-color)!important">
        <li class="nav-item">
          <a class="nav-link active" id="tab-login" href="#">Sign In</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="tab-register" href="#">Register</a>
        </li>
      </ul>

      <!-- Login Form -->
      <div id="login-form">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="login-email" placeholder="admin@business.com" autocomplete="email" />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label d-flex justify-content-between">
            Password
            <a href="#" id="forgot-link" style="font-size:.75rem;font-weight:500">Forgot password?</a>
          </label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="login-password" placeholder="••••••••" autocomplete="current-password" />
            <button class="btn btn-glass" type="button" id="toggle-pw"><i class="bi bi-eye"></i></button>
          </div>
        </div>
        <button class="btn btn-primary w-100 py-3" id="login-btn" style="font-weight:700;font-family:var(--font-display)">
          <span id="login-btn-text"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
          <span id="login-btn-loading" class="d-none"><div class="fp-spinner mx-auto" style="width:18px;height:18px;border-width:2px"></div></span>
        </button>
        <div id="login-error" class="mt-3 text-danger" style="font-size:.83rem;display:none"></div>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="d-none">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="reg-name" placeholder="John Doe" />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="reg-email" placeholder="staff@business.com" />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="reg-password" placeholder="Min 6 characters" />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Role</label>
          <select class="form-select" id="reg-role">
            <option value="cashier">Cashier</option>
            <option value="manager">Manager</option>
          </select>
          <div class="mt-1" style="font-size:.72rem;color:var(--text-muted)"><i class="bi bi-info-circle me-1"></i>Admin accounts must be set manually via Firebase Console</div>
        </div>
        <button class="btn btn-primary w-100 py-3" id="register-btn" style="font-weight:700;font-family:var(--font-display)">
          <span id="reg-btn-text"><i class="bi bi-person-plus me-2"></i>Create Account</span>
          <span id="reg-btn-loading" class="d-none"><div class="fp-spinner mx-auto" style="width:18px;height:18px;border-width:2px"></div></span>
        </button>
        <div id="register-error" class="mt-3 text-danger" style="font-size:.83rem;display:none"></div>
      </div>

      <!-- Theme toggle -->
      <div class="text-center mt-4" style="font-size:.75rem;color:var(--text-muted)">
        <button class="btn btn-glass btn-sm" data-theme-toggle>
          <i class="bi bi-sun-fill me-1"></i><span data-theme-label>Light Mode</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { login, register }    from './js/auth.js';
    import { guard }              from './js/router.js';
    import { initTheme }          from './js/theme.js';
    import { Toast }              from './js/utils.js';

    initTheme();

    // Guard will redirect if already logged in
    guard();

    // ── Tab switching ──
    document.getElementById('tab-login').addEventListener('click', e => {
      e.preventDefault();
      document.getElementById('login-form').classList.remove('d-none');
      document.getElementById('register-form').classList.add('d-none');
      document.getElementById('tab-login').classList.add('active');
      document.getElementById('tab-register').classList.remove('active');
    });
    document.getElementById('tab-register').addEventListener('click', e => {
      e.preventDefault();
      document.getElementById('login-form').classList.add('d-none');
      document.getElementById('register-form').classList.remove('d-none');
      document.getElementById('tab-register').classList.add('active');
      document.getElementById('tab-login').classList.remove('active');
    });

    // ── Password toggle ──
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw  = document.getElementById('login-password');
      const ico = document.querySelector('#toggle-pw i');
      if (pw.type === 'password') { pw.type = 'text'; ico.className = 'bi bi-eye-slash'; }
      else                        { pw.type = 'password'; ico.className = 'bi bi-eye'; }
    });

    // ── Login ──
    async function doLogin() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl    = document.getElementById('login-error');
      errEl.style.display = 'none';

      if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return; }

      document.getElementById('login-btn-text').classList.add('d-none');
      document.getElementById('login-btn-loading').classList.remove('d-none');
      document.getElementById('login-btn').disabled = true;

      try {
        await login(email, password);
        // router will handle redirect via guard() on next page
      } catch (err) {
        const msgs = {
          'auth/user-not-found':    'No account found with this email.',
          'auth/wrong-password':    'Incorrect password.',
          'auth/invalid-credential':'Invalid email or password.',
          'auth/too-many-requests': 'Too many attempts. Please try again later.',
          'auth/invalid-email':     'Invalid email address.'
        };
        errEl.textContent = msgs[err.code] || 'Sign in failed. Please try again.';
        errEl.style.display = 'block';
      } finally {
        document.getElementById('login-btn-text').classList.remove('d-none');
        document.getElementById('login-btn-loading').classList.add('d-none');
        document.getElementById('login-btn').disabled = false;
      }
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    // ── Register ──
    document.getElementById('register-btn').addEventListener('click', async () => {
      const name     = document.getElementById('reg-name').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const role     = document.getElementById('reg-role').value;
      const errEl    = document.getElementById('register-error');
      errEl.style.display = 'none';

      if (!name || !email || !password) { errEl.textContent = 'All fields are required.'; errEl.style.display = 'block'; return; }
      if (password.length < 6)          { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }

      document.getElementById('reg-btn-text').classList.add('d-none');
      document.getElementById('reg-btn-loading').classList.remove('d-none');
      document.getElementById('register-btn').disabled = true;

      try {
        await register(name, email, password, role);
        Toast.success('Account created! Redirecting…');
      } catch (err) {
        const msgs = {
          'auth/email-already-in-use': 'An account with this email already exists.',
          'auth/invalid-email':        'Invalid email address.',
          'auth/weak-password':        'Password is too weak.'
        };
        errEl.textContent = msgs[err.code] || 'Registration failed: ' + err.message;
        errEl.style.display = 'block';
        document.getElementById('reg-btn-text').classList.remove('d-none');
        document.getElementById('reg-btn-loading').classList.add('d-none');
        document.getElementById('register-btn').disabled = false;
      }
    });

    // ── Forgot password ──
    document.getElementById('forgot-link').addEventListener('click', async e => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      if (!email) { Toast.warning('Enter your email address first.'); return; }
      try {
        const { resetPassword } = await import('./js/auth.js');
        await resetPassword(email);
        Toast.success('Password reset email sent!');
      } catch (_) { Toast.error('Failed to send reset email.'); }
    });
  </script>
</body>
</html>
