<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlexPOS — Products</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
</head>
<body>
  <div id="sidebar-mount"></div>
  <div class="main-wrapper" id="main-wrapper">
    <div id="topbar-mount"></div>
    <main class="page-content">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h1 class="page-title">Products <span>Catalog</span></h1>
          <div class="page-subtitle">Manage your product inventory and pricing</div>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-glass" id="import-csv-btn"><i class="bi bi-upload me-2"></i>Import CSV</button>
          <button class="btn btn-glass" id="export-btn"><i class="bi bi-download me-2"></i>Export</button>
          <button class="btn btn-primary" id="add-product-btn"><i class="bi bi-plus-lg me-2"></i>Add Product</button>
        </div>
      </div>

      <!-- Filters -->
      <div class="glass-card p-3 mb-4">
        <div class="row g-3 align-items-center">
          <div class="col-12 col-md-5">
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control" id="product-search" placeholder="Search products…" />
            </div>
          </div>
          <div class="col-6 col-md-3">
            <select class="form-select" id="filter-category">
              <option value="">All Categories</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <select class="form-select" id="filter-stock">
              <option value="">All Stock</option>
              <option value="low">Low Stock</option>
              <option value="out">Out of Stock</option>
            </select>
          </div>
          <div class="col-12 col-md-2 text-end">
            <span id="product-count-badge" class="fp-badge fp-badge-primary">0 products</span>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="glass-card">
        <div class="fp-table-wrapper">
          <table class="fp-table">
            <thead>
              <tr>
                <th style="width:48px"></th>
                <th data-sort="name">Name <i class="bi bi-arrow-down-up ms-1" style="font-size:.65rem"></i></th>
                <th data-sort="category">Category</th>
                <th data-sort="price">Price</th>
                <th data-sort="stock">Stock</th>
                <th>Barcode</th>
                <th data-sort="supplier">Supplier</th>
                <th style="width:120px">Actions</th>
              </tr>
            </thead>
            <tbody id="products-tbody">
              <tr><td colspan="8" class="text-center py-5"><div class="fp-spinner mx-auto"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="fp-pagination" id="products-pagination"></div>
      </div>
    </main>
  </div>

  <!-- ── Product Drawer ── -->
  <div class="fp-drawer-overlay" id="drawer-overlay"></div>
  <div class="fp-drawer" id="product-drawer">
    <div class="fp-drawer-header">
      <div class="fp-drawer-title" id="drawer-title">Add Product</div>
      <button class="btn btn-glass btn-icon" id="close-drawer-btn"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="fp-drawer-body">
      <input type="hidden" id="edit-product-id" />

      <!-- Image upload -->
      <div class="mb-4">
        <label class="form-label">Product Image</label>
        <div class="img-upload-zone" id="img-upload-zone">
          <i class="bi bi-image" style="font-size:2rem;display:block;margin-bottom:8px"></i>
          <div>Click or drag to upload</div>
          <div class="upload-hint text-muted mt-1" style="font-size:.75rem">Max 2MB · Compressed to &lt;100KB</div>
          <img class="img-upload-preview d-none" id="img-preview" alt="preview" />
        </div>
        <input type="hidden" id="product-image" />
      </div>

      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Product Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="p-name" placeholder="e.g. Espresso Coffee" />
        </div>
        <div class="col-6">
          <label class="form-label">Category <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="p-category" placeholder="e.g. Beverages" list="category-datalist" />
          <datalist id="category-datalist"></datalist>
        </div>
        <div class="col-6">
          <label class="form-label">Supplier</label>
          <input type="text" class="form-control" id="p-supplier" placeholder="Supplier name" />
        </div>
        <div class="col-6">
          <label class="form-label">Selling Price <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" class="form-control" id="p-price" min="0" step="0.01" placeholder="0.00" />
          </div>
        </div>
        <div class="col-6">
          <label class="form-label">Cost Price</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" class="form-control" id="p-cost" min="0" step="0.01" placeholder="0.00" />
          </div>
        </div>
        <div class="col-6">
          <label class="form-label">Stock Quantity <span class="text-danger">*</span></label>
          <input type="number" class="form-control" id="p-stock" min="0" placeholder="0" />
        </div>
        <div class="col-6">
          <label class="form-label">Low Stock Alert</label>
          <input type="number" class="form-control" id="p-low-stock" min="0" placeholder="10" />
        </div>
        <div class="col-12">
          <label class="form-label d-flex justify-content-between align-items-center">
            Barcode
            <button class="btn btn-glass btn-sm" id="gen-barcode-btn"><i class="bi bi-upc me-1"></i>Generate EAN-13</button>
          </label>
          <input type="text" class="form-control" id="p-barcode" placeholder="EAN-13 barcode" />
        </div>

        <!-- Barcode Preview -->
        <div class="col-12" id="barcode-preview-wrap" style="display:none">
          <div class="glass-card p-3 text-center">
            <canvas id="barcode-canvas"></canvas>
            <div class="mt-2">
              <button class="btn btn-glass btn-sm" id="print-barcode-btn"><i class="bi bi-printer me-1"></i>Print Barcode</button>
              <button class="btn btn-glass btn-sm ms-2" id="show-qr-btn"><i class="bi bi-qr-code me-1"></i>QR Code</button>
            </div>
          </div>
        </div>

        <!-- QR Preview -->
        <div class="col-12" id="qr-preview-wrap" style="display:none">
          <div class="glass-card p-3 text-center">
            <div id="qr-container" class="d-inline-block"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="fp-drawer-footer">
      <button class="btn btn-glass" id="cancel-drawer-btn">Cancel</button>
      <button class="btn btn-primary" id="save-product-btn">
        <i class="bi bi-check-lg me-2"></i>Save Product
      </button>
    </div>
  </div>

  <!-- Hidden CSV input -->
  <input type="file" id="csv-file-input" accept=".csv" style="display:none" />

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script type="module" src="./js/pages/products.js"></script>
</body>
</html>
